<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digital Oasis — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: rgba(230, 245, 120, 0.95);
    --accent-glow: rgba(230, 245, 120, 0.18);
    --heading: #f8fcf0;
    --label: rgba(210, 230, 160, 0.65);
    --body: rgba(215, 230, 190, 0.55);
    --border: rgba(140, 180, 120, 0.18);
    --border-hover: rgba(180, 210, 140, 0.5);
    --card-bg: rgba(10, 18, 10, 0.58);
    --input-bg: rgba(8, 16, 8, 0.5);
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; }

  #overlay {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  /* ── Card ── */
  .auth-card {
    pointer-events: all;
    position: relative;
    width: min(420px, calc(100vw - 32px));
    background: var(--card-bg);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 44px 40px 38px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    opacity: 0;
    transform: translateY(40px);
    animation: cardIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    box-shadow: 0 0 0 1px rgba(200,240,120,0.04) inset, 0 28px 70px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.3);
  }

  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,240,120,0.25) 30%, rgba(230,245,120,0.4) 50%, rgba(200,240,120,0.25) 70%, transparent);
  }

  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

  /* ── Tab switcher ── */
  .tab-row {
    display: flex;
    width: 100%;
    background: rgba(8,15,8,0.5);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 30px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--body);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
  }

  .tab-btn.active {
    background: rgba(20, 38, 16, 0.7);
    color: var(--accent);
    box-shadow: 0 0 0 1px rgba(180,210,140,0.2) inset, 0 2px 8px rgba(0,0,0,0.3);
  }

  /* ── Heading ── */
  .card-label {
    font-size: 10px; font-weight: 500; letter-spacing: 4px;
    text-transform: uppercase; color: var(--label); margin-bottom: 16px;
  }

  .card-heading {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 4.5vw, 44px);
    font-weight: 400; line-height: 1.05;
    color: var(--heading); margin-bottom: 8px;
    text-shadow: 0 2px 30px rgba(0,0,0,0.5);
  }
  .card-heading em {
    font-style: italic;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(230,245,120,0.2);
  }

  .card-subtext {
    font-size: 13px; font-weight: 300;
    color: var(--body); margin-bottom: 28px; letter-spacing: 0.2px;
  }

  /* ── Input fields ── */
  .field {
    width: 100%;
    margin-bottom: 14px;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 10px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; color: var(--label);
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--heading);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    letter-spacing: 0.3px;
  }

  .field input::placeholder { color: rgba(180,210,150,0.25); }

  .field input:focus {
    border-color: rgba(180, 210, 140, 0.45);
    background: rgba(12, 22, 10, 0.65);
    box-shadow: 0 0 0 3px rgba(180,210,140,0.07), 0 0 18px rgba(180,210,140,0.04);
  }

  /* toggle password eye */
  .eye-btn {
    position: absolute; right: 12px; bottom: 12px;
    background: none; border: none; cursor: pointer; padding: 2px;
    color: rgba(180,210,140,0.3); transition: color 0.2s;
    display: flex; align-items: center;
  }
  .eye-btn:hover { color: rgba(180,210,140,0.65); }

  /* ── Forgot link ── */
  .forgot-row {
    width: 100%; display: flex; justify-content: flex-end;
    margin-bottom: 22px; margin-top: -6px;
  }

  .forgot-link {
    font-size: 11px; font-weight: 300;
    color: rgba(210,230,160,0.4);
    text-decoration: none; cursor: pointer;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--accent); }

  /* ── Submit button ── */
  .btn-submit {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    border-radius: 32px;
    border: 1px solid rgba(180,210,140,0.28);
    background: rgba(15,25,15,0.5);
    backdrop-filter: blur(12px);
    padding: 15px 24px;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), border-color 0.3s, background 0.3s, box-shadow 0.3s;
    margin-bottom: 22px;
    position: relative; overflow: hidden;
    outline: none;
  }

  .btn-submit::after {
    content: '';
    position: absolute; inset: 0; border-radius: 32px;
    background: radial-gradient(ellipse at center, rgba(230,245,120,0.07) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    border-color: rgba(180,210,140,0.55);
    background: rgba(22,38,18,0.6);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(180,210,140,0.1) inset;
  }
  .btn-submit:hover::after { opacity: 1; }
  .btn-submit:active { transform: translateY(0); }

  .btn-submit .btn-text {
    font-size: 11.5px; font-weight: 500; letter-spacing: 1.8px;
    color: var(--accent); text-transform: uppercase; transition: opacity 0.2s;
  }

  .spinner {
    display: none; width: 18px; height: 18px;
    border: 1.5px solid rgba(230,245,120,0.2);
    border-top-color: rgba(230,245,120,0.9);
    border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { opacity: 0.5; }
  .btn-submit.loading { pointer-events: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Divider ── */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(140,180,120,0.12) 30%, rgba(140,180,120,0.12) 70%, transparent);
    margin-bottom: 20px;
  }

  .card-footer {
    font-size: 11px; font-weight: 300;
    color: rgba(215,230,190,0.32); align-self: center; letter-spacing: 0.3px;
  }

  /* ── Panel visibility ── */
  .panel { display: none; width: 100%; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── Error / success messages ── */
  .msg {
    font-size: 11.5px; font-weight: 300;
    padding: 10px 14px; border-radius: 8px;
    margin-bottom: 16px; display: none; width: 100%;
    letter-spacing: 0.2px; line-height: 1.5;
  }
  .msg.error { background: rgba(180,60,40,0.15); border: 1px solid rgba(220,80,60,0.2); color: rgba(255,160,140,0.85); }
  .msg.success { background: rgba(80,160,60,0.12); border: 1px solid rgba(140,200,100,0.2); color: rgba(180,230,140,0.85); }
  .msg.show { display: block; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="overlay">
  <div class="auth-card">

    <span class="card-label">Rooted in Tomorrow</span>

    <!-- Headings (swap via JS) -->
    <h1 class="card-heading" id="cardHeading">Welcome <em>Back</em></h1>
    <p class="card-subtext" id="cardSub">Sign in to your sanctuary</p>

    <!-- Tab switcher -->
    <div class="tab-row">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- ── LOGIN PANEL ── -->
    <div class="panel active" id="panelLogin">
      <div class="msg error" id="loginError"></div>

      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@sanctuary.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="loginPass">Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
        <button class="eye-btn" onclick="togglePass('loginPass', this)" tabindex="-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="forgot-row">
        <a class="forgot-link" href="#" onclick="showForgot(event)">Forgot password?</a>
      </div>

      <button class="btn-submit" id="btnLogin" onclick="handleLogin()">
        <div class="spinner"></div>
        <span class="btn-text">Enter the Oasis</span>
      </button>
    </div>

    <!-- ── REGISTER PANEL ── -->
    <div class="panel" id="panelRegister">
      <div class="msg error" id="regError"></div>
      <div class="msg success" id="regSuccess"></div>

      <div class="field">
        <label for="regName">Full Name</label>
        <input type="text" id="regName" placeholder="Your name" autocomplete="name"/>
      </div>

      <div class="field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="you@sanctuary.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="regPass">Password</label>
        <input type="password" id="regPass" placeholder="Min. 8 characters" autocomplete="new-password"/>
        <button class="eye-btn" onclick="togglePass('regPass', this)" tabindex="-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="field" style="margin-bottom:22px">
        <label for="regConfirm">Confirm Password</label>
        <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password"/>
      </div>

      <button class="btn-submit" id="btnRegister" onclick="handleRegister()">
        <div class="spinner"></div>
        <span class="btn-text">Join the Oasis</span>
      </button>
    </div>

    <div class="divider"></div>
    <p class="card-footer" id="cardFooter">New here? Your oasis awaits.</p>
  </div>
</div>

<script>
  // ── Tab switch ───────────────────────────────────────────────
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('panelLogin').classList.toggle('active', isLogin);
    document.getElementById('panelRegister').classList.toggle('active', !isLogin);
    document.getElementById('cardHeading').innerHTML = isLogin ? 'Welcome <em>Back</em>' : 'Join the <em>Oasis</em>';
    document.getElementById('cardSub').textContent = isLogin ? 'Sign in to your sanctuary' : 'Create your sanctuary account';
    document.getElementById('cardFooter').textContent = isLogin ? 'New here? Your oasis awaits.' : 'Already have an account? Sign in above.';
  }

  // ── Toggle password visibility ────────────────────────────────
  function togglePass(inputId, btn) {
    const inp = document.getElementById(inputId);
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    btn.innerHTML = showing
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }

  // ── Forgot password ───────────────────────────────────────────
  function showForgot(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const err = document.getElementById('loginError');
    if (!email) {
      showMsg(err, 'Enter your email above first, then click Forgot password.', 'error');
      return;
    }
    showMsg(err, `Reset link sent to ${email} — check your inbox.`, 'success');
  }

  // ── Show message helper ───────────────────────────────────────
  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = `msg ${type} show`;
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  // ── Login handler ─────────────────────────────────────────────
  window.handleLogin = function() {
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('loginError');
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPass').value;

    if (!email || !pass) { showMsg(err, 'Please fill in both fields.', 'error'); return; }
    if (!email.includes('@')) { showMsg(err, 'Enter a valid email address.', 'error'); return; }
    if (pass.length < 6) { showMsg(err, 'Password must be at least 6 characters.', 'error'); return; }

    btn.classList.add('loading');
    window.doFirebaseLogin(email, pass).then(() => {
      btn.classList.remove('loading');
      console.log('[Oasis] Login →', email);
      window.location.href = '/app/index.html';
    }).catch(error => {
      btn.classList.remove('loading');
      showMsg(err, error.message, 'error');
    });
  }

  // ── Register handler ──────────────────────────────────────────
  window.handleRegister = function() {
    const btn  = document.getElementById('btnRegister');
    const err  = document.getElementById('regError');
    const succ = document.getElementById('regSuccess');
    const name    = document.getElementById('regName').value.trim();
    const email   = document.getElementById('regEmail').value.trim();
    const pass    = document.getElementById('regPass').value;
    const confirm = document.getElementById('regConfirm').value;

    if (!name || !email || !pass || !confirm) { showMsg(err, 'Please fill in all fields.', 'error'); return; }
    if (!email.includes('@')) { showMsg(err, 'Enter a valid email address.', 'error'); return; }
    if (pass.length < 6) { showMsg(err, 'Password must be at least 6 characters.', 'error'); return; }
    if (pass !== confirm) { showMsg(err, 'Passwords do not match.', 'error'); return; }

    btn.classList.add('loading');
    window.doFirebaseRegister(email, pass, name).then(() => {
      btn.classList.remove('loading');
      showMsg(succ, `Welcome, ${name}! Your sanctuary is ready.`, 'success');
      console.log('[Oasis] Register →', email);
      window.location.href = '/app/index.html';
    }).catch(error => {
      btn.classList.remove('loading');
      showMsg(err, error.message, 'error');
    });
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panelLogin').classList.contains('active')) window.handleLogin();
    else window.handleRegister();
  });
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAb1B6LqqTMMZnz-AY8f0ddSemWh8zZ2SE",
    authDomain: "auth-8c5ed.firebaseapp.com",
    projectId: "auth-8c5ed",
    storageBucket: "auth-8c5ed.firebasestorage.app",
    messagingSenderId: "418145065852",
    appId: "1:418145065852:web:d73d946f314b28275be2f9",
    measurementId: "G-J4V0CPSZDQ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Auto-redirect if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = '/app/index.html';
    }
  });

  window.doFirebaseLogin = async (email, password) => {
    await signInWithEmailAndPassword(auth, email, password);
  };

  window.doFirebaseRegister = async (email, password, name) => {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    
    // Create initial user profile in Firestore
    const profileData = {
      uid: user.uid,
      email: user.email,
      name: name,
      farmSize: "",
      location: "",
      soilType: "",
      primaryCrops: [],
      createdAt: new Date().toISOString()
    };
    
    await setDoc(doc(db, "users", user.uid), profileData);
    return user;
  };
</script>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js';

const container = document.getElementById('canvas-container');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x0a0f08, 0.042);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 9, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x2a4f20, 3.8));
const sun = new THREE.DirectionalLight(0xffe8a0, 4.0);
sun.position.set(8, 18, 5); sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-30; sun.shadow.camera.right=30;
sun.shadow.camera.top=30; sun.shadow.camera.bottom=-30;
sun.shadow.bias=-0.001; scene.add(sun);
const rim = new THREE.DirectionalLight(0x88c840, 0.9);
rim.position.set(-5,3,-10); scene.add(rim);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshLambertMaterial({ color: 0x0d1a08 })
);
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

const BLADE_COUNT=80000, ACCENT_COUNT=6000, FIELD=50, SEGS=5;

function buildBladeGeo() {
  const pos=[], uvs=[], idx=[];
  for(let s=0;s<=SEGS;s++){
    const t=s/SEGS, hw=0.05*(1-t*0.85);
    pos.push(-hw,t,0, hw,t,0); uvs.push(0,t, 1,t);
  }
  for(let s=0;s<SEGS;s++){
    const b=s*2;
    idx.push(b,b+1,b+2, b+1,b+3,b+2);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  g.setIndex(idx); g.computeVertexNormals(); return g;
}

function buildData(n, sm=1) {
  const off=new Float32Array(n*3),rot=new Float32Array(n),sc=new Float32Array(n),rnd=new Float32Array(n*4);
  for(let i=0;i<n;i++){
    off[i*3]=(Math.random()-.5)*FIELD; off[i*3+1]=0; off[i*3+2]=(Math.random()-.5)*FIELD;
    rot[i]=Math.random()*Math.PI*2; sc[i]=(0.6+Math.random()*0.8)*sm;
    rnd[i*4]=Math.random(); rnd[i*4+1]=Math.random(); rnd[i*4+2]=Math.random(); rnd[i*4+3]=Math.random();
  }
  return {off,rot,sc,rnd};
}

const vert=`precision highp float;
attribute vec3 position;
attribute vec2 uv;
attribute vec3 aOffset; attribute float aRotation,aScale; attribute vec4 aRand;
uniform mat4 projectionMatrix;
uniform mat4 modelViewMatrix;
uniform float uTime,uWS,uWF; uniform vec2 uWD; uniform vec3 uMouse; uniform float uRR,uRS;
varying float vT,vRT,vAO; varying vec3 vWP;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}
void main(){
  vT=uv.y;vRT=aRand.y;
  vec3 lp=position;lp.y*=aScale*(0.85+aRand.w*0.3);
  vec2 wd=normalize(uWD);float wt=uTime*uWF,st=vT*vT*vT;
  float wn=(noise(aOffset.xz*.08+wt*wd*.7)+.5*noise(aOffset.xz*.184+wt*wd*1.2+1.7)+.25*noise(aOffset.xz*.408+wt*wd*1.8+3.3))/1.75;
  float la=wn*uWS*(0.6+aRand.z*0.4)*st+aRand.z*0.25*st;
  float lx=sin(aRotation)*la,lz=cos(aRotation)*la;
  vec2 tm=aOffset.xz-uMouse.xz;float md=length(tm);
  float rep=smoothstep(uRR,0.,md);vec2 rd=md>.001?normalize(tm):vec2(1,0);
  lx+=rd.x*rep*uRS*st;lz+=rd.y*rep*uRS*st;
  float cr=cos(aRotation),sr=sin(aRotation);
  vec3 r=vec3(lp.x*cr-lp.z*sr,lp.y,lp.x*sr+lp.z*cr);
  r.x+=lx;r.z+=lz;vWP=aOffset+r;vAO=smoothstep(0.,.35,vT);
  gl_Position=projectionMatrix*modelViewMatrix*vec4(vWP,1.);
}`;

const frag=`precision highp float;
uniform vec3 uBase,uMid,uTip,uGold,uFogC,cameraPosition; uniform float uFogD;
varying float vT,vRT,vAO; varying vec3 vWP;
void main(){
  vec3 tip=mix(uTip,uGold,vRT*0.6);
  vec3 col=vT<.5?mix(uBase,uMid,vT*2.):mix(uMid,tip,(vT-.5)*2.);
  col*=(.55+vAO*.55);
  col+=vec3(.9,1.,.5)*pow(max(0.,vT-.7)/.3,3.)*.25*vRT;
  float ff=1.-exp(-uFogD*length(vWP-cameraPosition)*length(vWP-cameraPosition)*.5);
  gl_FragColor=vec4(mix(col,uFogC,clamp(ff,0.,.92)),1.);
}`;

const timeU={value:0}, mouseU={value:new THREE.Vector3(9999,0,9999)};

function makeMesh(n,sm,bc,mc,tc,gc,ws,wf,rs){
  const {off,rot,sc,rnd}=buildData(n,sm);
  const geo=buildBladeGeo();
  geo.setAttribute('aOffset',new THREE.InstancedBufferAttribute(off,3));
  geo.setAttribute('aRotation',new THREE.InstancedBufferAttribute(rot,1));
  geo.setAttribute('aScale',new THREE.InstancedBufferAttribute(sc,1));
  geo.setAttribute('aRand',new THREE.InstancedBufferAttribute(rnd,4));
  const mat=new THREE.RawShaderMaterial({
    uniforms:{uTime:timeU,uWS:{value:ws},uWF:{value:wf},uWD:{value:new THREE.Vector2(1,.3)},
      uMouse:mouseU,uRR:{value:3.5},uRS:{value:rs},
      uBase:{value:new THREE.Color(bc)},uMid:{value:new THREE.Color(mc)},
      uTip:{value:new THREE.Color(tc)},uGold:{value:new THREE.Color(gc)},
      uFogC:{value:new THREE.Color(0x0a0f08)},uFogD:{value:0.042}},
    vertexShader:vert,fragmentShader:frag,side:THREE.DoubleSide
  });
  const mesh=new THREE.InstancedMesh(geo,mat,n);
  mesh.frustumCulled=false;
  const d=new THREE.Object3D();
  for(let i=0;i<n;i++){d.updateMatrix();mesh.setMatrixAt(i,d.matrix);}
  mesh.instanceMatrix.needsUpdate=true;
  return mesh;
}

scene.add(makeMesh(BLADE_COUNT,1.0,0x4a7a30,0x8aac50,0xe8f860,0xf0e060,0.70,0.40,2.2));
scene.add(makeMesh(ACCENT_COUNT,1.6,0x3a6025,0x9acc38,0xe8f840,0xfce878,0.95,0.28,2.8));

// Fireflies
const FF=120, ffP0=new Float32Array(FF*3), ffPh=new Float32Array(FF);
for(let i=0;i<FF;i++){
  ffP0[i*3]=(Math.random()-.5)*FIELD*.8;ffP0[i*3+1]=0.5+Math.random()*2.5;ffP0[i*3+2]=(Math.random()-.5)*FIELD*.8;
  ffPh[i]=Math.random()*Math.PI*2;
}
const ffGeo=new THREE.BufferGeometry();
ffGeo.setAttribute('position',new THREE.Float32BufferAttribute(ffP0.slice(),3));
const ffMat=new THREE.PointsMaterial({color:0xdff060,size:0.06,transparent:true,opacity:.85,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
scene.add(new THREE.Points(ffGeo,ffMat));

const ray=new THREE.Raycaster(),gPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const tMouse=new THREE.Vector3(9999,0,9999),sMouse=new THREE.Vector3(9999,0,9999),_v2=new THREE.Vector2();

function onPtr(cx,cy){
  _v2.set((cx/innerWidth)*2-1,-(cy/innerHeight)*2+1);
  ray.setFromCamera(_v2,camera);ray.ray.intersectPlane(gPlane,tMouse);
}
window.addEventListener('mousemove',e=>onPtr(e.clientX,e.clientY));
window.addEventListener('touchmove',e=>{e.preventDefault();onPtr(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('mouseleave',()=>tMouse.set(9999,0,9999));

const clock=new THREE.Clock();
const ffPA=ffGeo.getAttribute('position');

renderer.setAnimationLoop(()=>{
  const t=clock.getElapsedTime();
  timeU.value=t;
  sMouse.lerp(tMouse,.08);
  mouseU.value.copy(sMouse);
  for(let i=0;i<FF;i++){
    ffPA.setX(i,ffP0[i*3]+Math.sin(ffPh[i]+t*.4)*.6);
    ffPA.setZ(i,ffP0[i*3+2]+Math.cos(ffPh[i]*1.3+t*.3)*.6);
  }
  ffPA.needsUpdate=true;
  ffMat.opacity=0.5+0.45*Math.sin(t*1.5);
  camera.position.x=Math.sin(t*.07)*1.2;
  camera.position.z=14+Math.cos(t*.05)*.8;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
